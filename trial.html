<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate History</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#0a0c10;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111;
}

.menu a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* DROPDOWN */
.dropdown{
  position:relative;
  display:inline-block;
}

.dropdown-menu{
  display:none;
  position:absolute;
  background:#222;
  top:100%;
  left:0;
}

.dropdown-menu a{
  display:block;
  padding:10px;
  color:white;
}

.dropdown.active .dropdown-menu{
  display:block;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  color:orange;
}

.hero p{
  max-width:500px;
  color:#aaa;
}

/* TIMELINE */
.timeline{
  width:80%;
  margin:auto;
  position:relative;
}

.timeline::after{
  content:"";
  position:absolute;
  left:50%;
  width:2px;
  height:100%;
  background:orange;
}

.item{
  width:50%;
  padding:20px;
  position:relative;
}

.item.left{
  left:0;
  text-align:right;
}

.item.right{
  left:50%;
}

.item::before{
  content:"";
  position:absolute;
  top:20px;
  width:12px;
  height:12px;
  background:orange;
  border-radius:50%;
}

.item.left::before{
  right:-6px;
}

.item.right::before{
  left:-6px;
}

.card{
  background:#161b26;
  padding:15px;
  border-radius:8px;
}

/* FOOTER */
.footer{
  background:#111;
  padding:20px;
  text-align:center;
  margin-top:50px;
}

/* MOBILE */
@media(max-width:768px){
  .timeline::after{
    left:20px;
  }

  .item{
    width:100%;
    padding-left:50px;
  }

  .item.right{
    left:0;
  }

  .item::before{
    left:14px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>Cosmo</div>

  <div class="menu">
    <a href="#">Home</a>

    <div class="dropdown">
      <a href="#" class="dropdown-toggle">About ▾</a>
      <div class="dropdown-menu">
        <a href="#">History</a>
        <a href="#">Team</a>
      </div>
    </div>

    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Corporate History</h1>
  <p>From 1998 to today</p>
</section>

<!-- TIMELINE -->
<div class="timeline">

  <div class="item left">
    <div class="card">
      <h2>1998</h2>
      <p>Company started</p>
    </div>
  </div>

  <div class="item right">
    <div class="card">
      <h2>2000</h2>
      <p>Expansion started</p>
    </div>
  </div>

  <div class="item left">
    <div class="card">
      <h2>2005</h2>
      <p>India setup</p>
    </div>
  </div>

  <div class="item right">
    <div class="card">
      <h2>2010</h2>
      <p>Growth phase</p>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Cosmo Instruments India
</div>

<!-- JS -->
<script>

document.querySelectorAll(".dropdown-toggle").forEach(btn=>{
  btn.addEventListener("click",(e)=>{
    e.preventDefault();
    btn.parentElement.classList.toggle("active");
  });
});

document.addEventListener("click",(e)=>{
  if(!e.target.closest(".dropdown")){
    document.querySelectorAll(".dropdown").forEach(d=>{
      d.classList.remove("active");
    });
  }
});

</script>

</body>
</html>
